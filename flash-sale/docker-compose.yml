version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flash-sale-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flashsale
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flashsale"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: flash-sale-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/flashsale?schema=public
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --force-reset && npx tsx prisma/seed.ts && npm run dev"

  frontend:
    build: ./frontend
    container_name: flash-sale-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    # Explicitly forcing Next.js dev server to accept external connections from the host machine
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  postgres_data:
  